<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMPHICLASH — Clash Hub</title>
  <link rel="stylesheet" href="_styles.css?v=2">
  <style>
    body { align-items: stretch; background: #eef0f2; }
    .app-shell { height: 100dvh; max-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #eef0f2; }
    .app-header .logo { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    .greet { flex-shrink: 0; padding: 10px 20px 6px; }
    .greet-hi { font-family: var(--f-display); font-weight: 900; font-size: 26px; letter-spacing: -.03em; color: var(--tx); line-height: 1; }
    .greet-hi em { font-style: normal; color: var(--tx-3); }
    .greet-sub { font-family: var(--f-mono); font-size: 10px; color: var(--tx-3); margin-top: 7px; letter-spacing: .03em; }

    /* ── Full-bleed horizontal pager ── */
    .pager-wrap { flex: 1; min-height: 0; position: relative; }
    .pager {
      position: absolute; inset: 0;
      display: flex; overflow-x: auto; overflow-y: hidden;
      scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .pager::-webkit-scrollbar { display: none; }
    .panel {
      flex-shrink: 0; width: 100%; min-width: 100%; height: 100%;
      scroll-snap-align: start; display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-h { flex-shrink: 0; display: flex; align-items: baseline; justify-content: space-between; padding: 2px 20px 8px; }
    .panel-t { font-family: var(--f-display); font-weight: 900; font-size: 15px; letter-spacing: -.01em; color: var(--tx); }
    .panel-n { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .14em; color: var(--tx-3); }
    .panel-scroll { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .panel-scroll::-webkit-scrollbar { display: none; }

    /* ── Panel 1: Hero ── */
    .hero-stack { flex: 1; min-height: 0; padding: 4px 20px 18px; display: flex; flex-direction: column; gap: 14px; }
    .hero-card {
      position: relative; flex: 1; min-height: 300px; border-radius: 24px; overflow: hidden; background: #e7eaed;
      box-shadow: 8px 11px 26px rgba(20,32,46,0.16), -5px -5px 14px rgba(255,255,255,0.7), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .hero-card::after { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: var(--metal); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 4; }
    .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hero-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(12,16,22,0.82) 0%, rgba(12,16,22,0.28) 42%, transparent 68%); z-index: 1; }
    .hero-tag { position: absolute; top: 16px; left: 16px; z-index: 3; font-family: var(--f-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 5px 11px; border-radius: 100px; background: rgba(255,255,255,0.94); color: var(--tx); display: inline-flex; align-items: center; gap: 6px; }
    .hero-tag--live { background: #14202e; color: #fff; }
    .hero-tag--live i { width: 6px; height: 6px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 5px var(--neon); animation: pulse 1.1s ease-in-out infinite; }
    .hero-meta { position: absolute; left: 19px; right: 19px; bottom: 19px; z-index: 3; }
    .hero-kicker { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,0.72); margin-bottom: 8px; }
    .hero-title { font-family: var(--f-display); font-weight: 900; font-size: 28px; letter-spacing: -.02em; line-height: 1.02; color: #fff; }
    .hero-cta { margin-top: 15px; display: inline-flex; align-items: center; gap: 7px; font-family: var(--f-mono); font-size: 10.5px; font-weight: 700; letter-spacing: .04em; color: var(--tx); background: #fff; border: none; border-radius: 100px; padding: 10px 18px; cursor: pointer; }
    .hero-cta--accent { background: hsl(22 92% 53%); color: #fff; }
    .hero-inner-dots { display: flex; gap: 6px; justify-content: center; }
    .hid { width: 6px; height: 6px; border-radius: 50%; background: rgba(20,32,46,0.18); transition: all .25s; }
    .hid.on { width: 18px; border-radius: 3px; background: #14202e; }
    .pulse-row { display: flex; gap: 10px; }
    .pulse-cell { flex: 1; border-radius: 14px; padding: 13px 14px; }
    .pulse-k { font-family: var(--f-mono); font-size: 8px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-3); }
    .pulse-v { font-family: var(--f-display); font-weight: 900; font-size: 23px; letter-spacing: -.02em; color: var(--tx); margin-top: 5px; line-height: 1; }
    .pulse-v small { font-size: 11px; color: var(--tx-3); font-weight: 700; }

    /* ── Feed cards (panels 2 & 3) ── */
    .stack { padding: 0 20px 18px; display: flex; flex-direction: column; gap: 11px; }
    .fcard { border-radius: 16px; padding: 15px 16px; }
    .fc-head { display: flex; align-items: center; gap: 9px; }
    .fc-av { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--f-display); font-weight: 900; font-size: 14px; border: 2px solid; background: #fff; }
    .fc-who { flex: 1; min-width: 0; }
    .fc-name { font-family: var(--f-ui); font-weight: 700; font-size: 13px; color: var(--tx); }
    .fc-time { font-family: var(--f-mono); font-size: 9px; color: var(--tx-3); margin-top: 2px; }
    .fc-kind { flex-shrink: 0; width: 25px; height: 25px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: var(--tx-3); background: rgba(20,32,46,0.05); }
    .fc-text { font-family: var(--f-ui); font-size: 13px; line-height: 1.5; color: var(--tx); margin-top: 11px; }
    .fc-text b { font-weight: 700; }
    .fc-score { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 11px; padding: 10px; border-radius: 11px; background: rgba(20,32,46,0.04); }
    .fc-sn { font-family: var(--f-display); font-weight: 900; font-size: 12px; color: var(--tx-3); }
    .fc-sn.win { color: var(--tx); }
    .fc-sv { font-family: var(--f-display); font-weight: 900; font-size: 20px; letter-spacing: -.02em; color: var(--tx); }
    .fc-sv .w { color: hsl(22 92% 50%); }
    .fc-rank { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 11px; padding: 11px; border-radius: 11px; background: rgba(20,32,46,0.04); font-family: var(--f-display); font-weight: 900; font-size: 12px; }
    .fc-rank .from { color: var(--tx-3); }
    .fc-rank .to { color: hsl(22 92% 50%); }
    .fc-foot { display: flex; align-items: center; gap: 17px; margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--line); }
    .fc-btn { display: flex; align-items: center; gap: 5px; font-family: var(--f-mono); font-size: 10.5px; font-weight: 700; color: var(--tx-3); background: none; border: none; cursor: pointer; padding: 0; }
    .fc-btn.liked { color: hsl(22 92% 50%); }

    /* news cards */
    .news { border-radius: 16px; overflow: hidden; position: relative; }
    .news-img-wrap { position: relative; height: 132px; }
    .news-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .news-scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(12,16,22,0.7), transparent 70%); }
    .news-badge { position: absolute; top: 12px; left: 12px; font-family: var(--f-mono); font-size: 8px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 4px 9px; border-radius: 100px; background: rgba(255,255,255,0.94); color: var(--tx); }
    .news-body { padding: 13px 15px 15px; }
    .news-t { font-family: var(--f-display); font-weight: 900; font-size: 16px; letter-spacing: -.01em; color: var(--tx); line-height: 1.15; }
    .news-d { font-family: var(--f-mono); font-size: 9.5px; color: var(--tx-3); margin-top: 6px; letter-spacing: .03em; }
    .news-cta { margin-top: 11px; font-family: var(--f-mono); font-size: 10px; font-weight: 700; color: var(--tx); background: none; border: none; padding: 0; cursor: pointer; }

    /* ── Bottom pager dots ── */
    .pager-dots { flex-shrink: 0; display: flex; gap: 7px; justify-content: center; padding: 10px 0 14px; }
    .pd { width: 7px; height: 7px; border-radius: 50%; background: rgba(20,32,46,0.18); transition: all .25s; }
    .pd.on { width: 24px; border-radius: 4px; background: #14202e; }
  </style>
</head>
<body class="aqua-bg skin-aqua">
  <div class="app-shell skin-aqua">

    <header class="app-header" style="flex-shrink:0;">
      <a href="Grid Hub.html" style="display:flex;align-items:center;color:var(--tx-2);text-decoration:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <span class="logo">CLASH HUB</span>
      <div class="header-icons">
        <a href="Notifications.html" class="header-icon" title="通知" style="position:relative;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5a5 5 0 0 1 5 5v2.5l1 2H2l1-2V6.5a5 5 0 0 1 5-5z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M6.5 13a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          <span style="position:absolute;top:1px;right:3px;width:7px;height:7px;border-radius:50%;background:hsl(8 90% 52%);z-index:5;"></span>
        </a>
        <a href="Profile.html" class="header-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </a>
      </div>
    </header>

    <div class="pager-wrap">
      <div class="pager" id="pager">

        <!-- Panel 1 — Hero -->
        <section class="panel" data-screen-label="精選">
          <div class="panel-h"><span class="panel-t"></span></div>
          <div class="panel-scroll" style="display:flex;flex-direction:column;">
            <div class="hero-stack">
              <div class="hero-card" id="hero-card">
                <img class="hero-img" id="hero-img" src="assets/beyblade-x-poster.jpeg" alt="">
                <div class="hero-scrim"></div>
                <span class="hero-tag" id="hero-tagel">★ 官方賽事</span>
                <div class="hero-meta">
                  <div class="hero-kicker" id="hero-kicker">7/1 SAT · 台北站</div>
                  <div class="hero-title" id="hero-title">7 月月賽<br>開放報名</div>
                  <button class="hero-cta hero-cta--accent" id="hero-cta">立即報名 →</button>
                </div>
              </div>
              <div class="hero-inner-dots" id="hero-inner-dots" style="display:none;"></div>
              <div class="pulse-row">
                <div class="glass pulse-cell"><div class="pulse-k">進行中</div><div class="pulse-v">3</div></div>
                <div class="glass pulse-cell"><div class="pulse-k">今日對戰</div><div class="pulse-v">248</div></div>
                <div class="glass pulse-cell"><div class="pulse-k">本週晉級</div><div class="pulse-v">17<small> 人</small></div></div>
              </div>
            </div>
          </div>
        </section>

        <!-- Panel 2 — 社群動態 -->
        <section class="panel" data-screen-label="社群動態">
          <div class="panel-h"><span class="panel-t">社群動態</span></div>
          <div class="panel-scroll"><div class="stack" id="feed-stack"></div></div>
        </section>

        <!-- Panel 3 — 賽事消息 -->
        <section class="panel" data-screen-label="賽事消息">
          <div class="panel-h"><span class="panel-t">賽事消息</span></div>
          <div class="panel-scroll"><div class="stack" id="news-stack"></div></div>
        </section>

      </div>
    </div>

    <div class="pager-dots" id="pager-dots">
      <span class="pd on"></span><span class="pd"></span><span class="pd"></span>
    </div>
  </div>

  <script>
    const RVAR = { 'Kai':'var(--rk-champ)','Vortex':'var(--rk-primus)','StormDragon':'var(--rk-primus)','NovaBlade':'var(--rk-sec)','Phoenix':'var(--rk-tiro)' };
    const I_WIN = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4.5 2.5h7v3a3.5 3.5 0 0 1-7 0v-3z" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 11h3M7 11v2.5h2V11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>';
    const I_RANK = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.6 3.4L13 6l-2.5 2.4.6 3.6L8 10.3 4.9 12l.6-3.6L3 6l3.4-.6L8 2z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>';

    /* hero slides */
    const HERO = [
      { img:'assets/beyblade-x-poster.jpeg', tag:'★ 官方賽事', live:false, kicker:'7/1 SAT · 台北站', title:'7 月月賽<br>開放報名', cta:'立即報名 →', accent:true, link:'Battle Spot.html' },
      { img:'assets/bg-kingkazuma.jpeg', tag:'NEW SEASON', live:false, kicker:'賽季更新', title:'AMPHICLASH<br>2.0 開跑', cta:'查看階級 →', accent:false, link:'Ranking.html' },
      { img:'assets/bg-oz.jpeg', tag:'LIVE', live:true, kicker:'板橋 Spin Arena', title:'深夜場<br>八強進行中', cta:'看賽程 →', accent:false, link:'Battle Spot.html' },
    ];
    let heroIdx=0;
    const hImg=document.getElementById('hero-img'), hTag=document.getElementById('hero-tagel'), hKick=document.getElementById('hero-kicker'), hTit=document.getElementById('hero-title'), hCta=document.getElementById('hero-cta');
    const hDots=document.getElementById('hero-inner-dots');
    hDots.innerHTML=HERO.map((_,i)=>`<span class="hid ${i===0?'on':''}" onclick="setHero(${i})"></span>`).join('');
    function setHero(i){
      heroIdx=i; const h=HERO[i];
      hImg.src=h.img;
      hTag.className='hero-tag'+(h.live?' hero-tag--live':''); hTag.innerHTML=(h.live?'<i></i>':'')+h.tag;
      hKick.textContent=h.kicker; hTit.innerHTML=h.title;
      hCta.className='hero-cta'+(h.accent?' hero-cta--accent':''); hCta.textContent=h.cta; hCta.onclick=()=>window.location=h.link;
      hDots.querySelectorAll('.hid').forEach((d,j)=>d.classList.toggle('on',j===i));
    }
    setHero(0);
    const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let heroAuto;
    function startHero(){ clearInterval(heroAuto); heroAuto=setInterval(()=>{ if(curPanel!==0) return; setHero((heroIdx+1)%HERO.length); }, 4000); }
    if(!reduce) startHero();

    /* feed */
    const POSTS = [
      { id:1, who:'Kai', av:'K', time:'3 小時前', text:'拿下這場硬仗,<b>XTREME</b> 終結漂亮!', report:{ a:'Kai', b:'Vortex', sa:4, sb:2 }, likes:24, liked:false },
      { id:2, who:'NovaBlade', av:'N', time:'5 小時前', text:'突破了!正式晉升,繼續衝 PRIMUS 💪', rankFrom:'PROV', rankTo:'SECUNDUS', likes:41, liked:true },
      { id:3, who:'StormDragon', av:'S', time:'昨天', text:'板橋深夜場八強,打到最後一回合!', report:{ a:'StormDragon', b:'IronClaw', sa:4, sb:3 }, likes:18, liked:false },
      { id:4, who:'Phoenix', av:'P', time:'昨天', text:'新手三個月,終於上 PROVOCATUS!', rankFrom:'GREG', rankTo:'PROVOCATUS', likes:33, liked:false },
      { id:5, who:'Vortex', av:'V', time:'2 天前', text:'復仇成功,守住 PRIMUS。', report:{ a:'Vortex', b:'Zenith', sa:4, sb:1 }, likes:29, liked:false },
    ];
    function fcard(p){
      const col=RVAR[p.who]||'var(--tx-3)'; let mid='';
      if(p.report){ const r=p.report, aw=r.sa>r.sb;
        mid=`<div class="fc-score"><span class="fc-sn ${aw?'win':''}">${r.a}</span><span class="fc-sv"><span class="${aw?'w':''}">${r.sa}</span>:<span class="${aw?'':'w'}">${r.sb}</span></span><span class="fc-sn ${aw?'':'win'}">${r.b}</span></div>`;
      } else if(p.rankTo){
        mid=`<div class="fc-rank"><span class="from">${p.rankFrom}</span><svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M4 9h8M10 5l4 4-4 4" stroke="hsl(22 92% 50%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="to">${p.rankTo}</span></div>`;
      }
      return `<div class="glass fcard">
        <div class="fc-head"><span class="fc-av" style="border-color:${col};color:${col};">${p.av}</span>
          <div class="fc-who"><div class="fc-name">${p.who}</div><div class="fc-time">${p.time}</div></div>
          <span class="fc-kind">${p.rankTo?I_RANK:I_WIN}</span></div>
        <div class="fc-text">${p.text}</div>${mid}
        <div class="fc-foot">
          <button class="fc-btn ${p.liked?'liked':''}" onclick="like(${p.id},this)"><svg width="13" height="13" viewBox="0 0 16 16" fill="${p.liked?'currentColor':'none'}"><path d="M8 13.5S2.5 9.8 2.5 6.2A2.7 2.7 0 0 1 8 5a2.7 2.7 0 0 1 5.5 1.2C13.5 9.8 8 13.5 8 13.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg><span data-likes>${p.likes}</span></button>
          <button class="fc-btn"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 0 1 10 0 5 5 0 0 1-5 5H3l1.4-1.4A4.9 4.9 0 0 1 3 8z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>留言</button>
        </div></div>`;
    }
    document.getElementById('feed-stack').innerHTML=POSTS.map(fcard).join('');
    function like(id,btn){ const p=POSTS.find(x=>x.id===id); p.liked=!p.liked; p.likes+=p.liked?1:-1; btn.classList.toggle('liked',p.liked); btn.querySelector('svg').setAttribute('fill',p.liked?'currentColor':'none'); btn.querySelector('[data-likes]').textContent=p.likes; }

    /* news */
    const NEWS = [
      { img:'assets/beyblade-x-poster.jpeg', badge:'官方', t:'7 月月賽 · 台北站', d:'7/1 (六) 14:00 · WBO 信義旗艦店', link:'Battle Spot.html' },
      { img:'assets/bg-kingkazuma.jpeg', badge:'賽季', t:'AMPHICLASH 2.0 賽季開跑', d:'即日起 · 全台據點 · 階級制度更新', link:'Ranking.html' },
      { img:'assets/bg-oz.jpeg', badge:'店家', t:'信義店 · 週五夜戰', d:'每週五 19:00 · 現場報名', link:'Battle Spot.html' },
    ];
    document.getElementById('news-stack').innerHTML=NEWS.map(n=>`
      <div class="glass news">
        <div class="news-img-wrap"><img class="news-img" src="${n.img}" alt=""><div class="news-scrim"></div><span class="news-badge">${n.badge}</span></div>
        <div class="news-body"><div class="news-t">${n.t}</div><div class="news-d">${n.d}</div><button class="news-cta" onclick="window.location='${n.link}'">查看詳情 →</button></div>
      </div>`).join('');

    /* pager dots */
    const pager=document.getElementById('pager');
    const pds=document.querySelectorAll('#pager-dots .pd');
    let curPanel=0;
    pager.addEventListener('scroll',()=>{
      const i=Math.round(pager.scrollLeft/pager.clientWidth);
      if(i!==curPanel){ curPanel=i; pds.forEach((d,j)=>d.classList.toggle('on',j===i)); }
    });
  </script>
</body>
</html>
