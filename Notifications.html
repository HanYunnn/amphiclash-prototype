<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMPHICLASH — Notifications</title>
  <link rel="stylesheet" href="_styles.css?v=20260624-1">
  <style>
    body { align-items: stretch; background: #ffffff; }
    .app-shell { height: 100dvh; max-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .app-header .logo { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    .n-top { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 4px; }
    .n-unread { font-family: var(--f-mono); font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--tx-3); }
    .n-read-all { font-family: var(--f-mono); font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--tx); background: none; border: none; cursor: pointer; }

    .n-scroll {
      flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 6px 16px 20px; scrollbar-width: thin; scrollbar-color: color-mix(in srgb,var(--tx-3) 45%,transparent) transparent;
    }
    .n-scroll::-webkit-scrollbar { width: 4px; }
    .n-scroll::-webkit-scrollbar-thumb { background: color-mix(in srgb,var(--tx-3) 45%,transparent); border-radius: 4px; }

    .n-day { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--tx-3); margin: 14px 4px 8px; }
    .n-day:first-child { margin-top: 4px; }

    .n-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 13px; border-radius: 13px; margin-bottom: 8px; cursor: pointer; position: relative; transition: transform .12s; }
    .skin-aqua .n-item { box-shadow: 3px 4px 11px rgba(20,32,46,0.06), -3px -3px 8px rgba(255,255,255,0.7), inset 0 1px 0 rgba(255,255,255,0.92) !important; }
    .n-item:active { transform: scale(0.995); }
    .n-item.unread::after { content: ''; position: absolute; top: 14px; right: 14px; width: 7px; height: 7px; border-radius: 50%; background: hsl(8 90% 52%); }
    .n-item.read { opacity: 0.62; }

    .n-ic { width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .n-ic--friend { color: var(--rk-champ); background: color-mix(in srgb,var(--rk-champ) 12%,transparent); }
    .n-ic--battle { color: var(--rk-primus); background: color-mix(in srgb,var(--rk-primus) 12%,transparent); }
    .n-ic--rank   { color: var(--rk-sec); background: color-mix(in srgb,var(--rk-sec) 12%,transparent); }
    .n-ic--spot   { color: var(--tx-2); background: rgba(20,32,46,0.06); }
    .n-ic--event  { color: hsl(25 90% 45%); background: hsl(25 90% 94%); }
    .n-av { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--f-display); font-weight: 900; font-size: 15px; border: 2px solid; background: #fff; }

    .n-body { flex: 1; min-width: 0; padding-right: 14px; }
    .n-text { font-family: var(--f-ui); font-size: 13px; line-height: 1.5; color: var(--tx); }
    .n-text b { font-weight: 700; }
    .n-time { font-family: var(--f-mono); font-size: 9px; color: var(--tx-3); margin-top: 4px; letter-spacing: .03em; }

    .n-actions { display: flex; gap: 7px; margin-top: 9px; }
    .n-btn { font-family: var(--f-mono); font-size: 11px; font-weight: 700; letter-spacing: .03em; padding: 7px 16px; border-radius: 9px; border: none; cursor: pointer; }
    .n-btn--accept { background: var(--tx); color: #fff; box-shadow: 2px 3px 8px rgba(20,32,46,0.2), inset 0 1px 0 rgba(255,255,255,0.16); }
    .n-btn--decline { background: rgba(20,32,46,0.05); color: var(--tx-2); }
    .n-resolved { font-family: var(--f-mono); font-size: 10px; font-weight: 700; color: var(--tx-3); margin-top: 9px; }

    .n-empty { text-align: center; padding: 60px 0; font-family: var(--f-mono); font-size: 11px; color: var(--tx-3); }
  </style>
</head>
<body class="aqua-bg skin-aqua">
  <div class="app-shell skin-aqua">

    <header class="app-header" style="flex-shrink:0;">
      <a href="Grid Hub.html" style="display:flex;align-items:center;color:var(--tx-2);text-decoration:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <span class="logo">通知</span>
      <div class="header-icons">
        <a href="Profile.html" class="header-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </a>
      </div>
    </header>

    <div class="n-top">
      <span class="n-unread" id="unread-count">3 則未讀</span>
      <button class="n-read-all" onclick="readAll()">全部標為已讀</button>
    </div>

    <div class="n-scroll" id="n-scroll"></div>
  </div>

  <script>
    const RVAR = { 'Vortex':'var(--rk-primus)','NovaBlade':'var(--rk-sec)','Phoenix':'var(--rk-tiro)','StormDragon':'var(--rk-primus)' };
    const IC = {
      friend:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="2.6" stroke="currentColor" stroke-width="1.3"/><path d="M3.5 14.5c0-3 2.5-4.6 5.5-4.6s5.5 1.6 5.5 4.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
      battle:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3l5 5M3 6V3h3M15 3l-5 5M15 6V3h-3M6.5 11.5L3 15M11.5 11.5L15 15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      rank:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2.5l1.9 3.9 4.1.6-3 2.9.7 4.1L9 12.6 5.3 14l.7-4.1-3-2.9 4.1-.6L9 2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>',
      spot:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.2" stroke="currentColor" stroke-width="1.3"/><path d="M9 5.5v3.5l2.3 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
      event:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="4" width="12" height="11" rx="1.6" stroke="currentColor" stroke-width="1.3"/><path d="M3 7h12M6 2.5v3M12 2.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
    };

    const NOTIFS = [
      { id:0, day:'今天', type:'friend-req', who:'Vortex', text:'<b>Vortex</b> 想加你為好友', time:'10 分鐘前', unread:true, state:'pending' },
      { id:1, day:'今天', kind:'battle', text:'你與 <b>Vortex</b> 的對戰結果已記錄 · <b>勝 4:2</b>', time:'1 小時前', unread:true, link:'Profile.html' },
      { id:2, day:'今天', kind:'rank', text:'恭喜!你晉升至 <b>CHAMPION</b> 階級 🏆', time:'1 小時前', unread:true, link:'Profile.html' },
      { id:3, day:'今天', kind:'spot', text:'你報名的 <b>週末信義團賽</b> 將於 19:00 開始', time:'3 小時前', unread:false, link:'Battle Spot.html' },
      { id:4, day:'昨天', type:'friend-acc', who:'NovaBlade', text:'<b>NovaBlade</b> 接受了你的好友邀請', time:'昨天 16:20', unread:false, link:'Profile.html' },
      { id:5, day:'昨天', kind:'event', text:'<b>7 月月賽</b> 開放報名,名額有限', time:'昨天 09:00', unread:false, link:'Battle Spot.html' },
      { id:6, day:'昨天', kind:'spot', text:'<b>Phoenix</b> 在你報名的揪團留言了', time:'昨天 08:30', unread:false, link:'Battle Spot.html' },
    ];

    function itemHtml(n){
      const left = n.who
        ? `<span class="n-av" style="border-color:${RVAR[n.who]||'var(--tx-3)'};color:${RVAR[n.who]||'var(--tx-3)'};">${n.who[0]}</span>`
        : `<span class="n-ic n-ic--${n.kind}">${IC[n.kind]}</span>`;
      let extra = '';
      if(n.type==='friend-req'){
        if(n.state==='pending') extra = `<div class="n-actions"><button class="n-btn n-btn--accept" onclick="respond(${n.id},true,event)">接受</button><button class="n-btn n-btn--decline" onclick="respond(${n.id},false,event)">忽略</button></div>`;
        else if(n.state==='accepted') extra = `<div class="n-resolved">✓ 已成為好友</div>`;
        else extra = `<div class="n-resolved">已忽略</div>`;
      }
      const cls = n.unread ? 'unread' : (n.read ? 'read' : '');
      const click = n.link ? `onclick="go('${n.link}')"` : '';
      return `<div class="glass n-item ${cls}" data-id="${n.id}" ${n.type==='friend-req'?'':click}>
        ${left}
        <div class="n-body"><div class="n-text">${n.text}</div><div class="n-time">${n.time}</div>${extra}</div>
      </div>`;
    }

    function render(){
      const days = [...new Set(NOTIFS.map(n=>n.day))];
      let html = '';
      for(const d of days){
        html += `<div class="n-day">${d}</div>`;
        html += NOTIFS.filter(n=>n.day===d).map(itemHtml).join('');
      }
      document.getElementById('n-scroll').innerHTML = html;
      updateCount();
    }
    function updateCount(){
      const u = NOTIFS.filter(n=>n.unread).length;
      document.getElementById('unread-count').textContent = u ? `${u} 則未讀` : '全部已讀';
    }
    function go(link){ window.location = link; }
    function respond(id, accept, ev){
      ev.stopPropagation();
      const n = NOTIFS.find(x=>x.id===id);
      n.state = accept ? 'accepted' : 'declined';
      n.unread = false;
      render();
    }
    function readAll(){ NOTIFS.forEach(n=>{ if(n.unread){ n.unread=false; n.read=true; } }); render(); }
    render();
  </script>
</body>
</html>
