<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMPHICLASH — Battle Result</title>
  <link rel="stylesheet" href="_styles.css?v=20260624-1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    body { align-items: stretch; background: #eef0f2; }
    .app-shell { height: 100dvh; max-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #eef0f2; }
    .app-header .logo { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    .res-scroll { flex: 1; min-height: 0; position: relative; }
    .res-pager { position: absolute; inset: 0; display: flex; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .res-pager::-webkit-scrollbar { display: none; }
    .rpanel { flex-shrink: 0; width: 100%; min-width: 100%; height: 100%; scroll-snap-align: start; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 6px 14px 10px; }
    .rpanel::-webkit-scrollbar { display: none; }
    .res-dots { flex-shrink: 0; display: flex; gap: 7px; justify-content: center; padding: 8px 0 4px; }
    .rd { width: 7px; height: 7px; border-radius: 50%; background: rgba(20,32,46,0.18); transition: all .25s; }
    .rd.on { width: 22px; border-radius: 4px; background: #14202e; }

    /* ── Winner + scoreboard merged ── */
    .win-eyebrow { text-align: center; padding: 18px 0 4px; }
    .win-eyebrow .lab { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .26em; text-transform: uppercase; color: var(--tx-3); }
    .win-eyebrow .fin { font-family: var(--f-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-3); margin-top: 8px; }
    .score-board { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; padding: 14px 4px 22px; }
    .sc-p { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
    .sc-crown { position: absolute; top: -14px; color: var(--rk-champ); }
    /* ── Score: single split bar (winner | loser) ── */
    .score-hero { padding: 18px 6px 8px; }
    .sh-eyebrow { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--rk-champ); margin-bottom: 14px; }
    .split-bar { display: flex; height: 132px; }
    .sb-seg { position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 16px 18px; min-width: 0; }
    .sb-seg--win { background: var(--tx); flex: 4; border-radius: 20px; z-index: 2; margin-right: -18px; box-shadow: 8px 0 22px rgba(20,32,46,0.28); }
    .sb-seg--lose { background: #e2e6ea; flex: 2; border-radius: 20px; padding-left: 30px; align-items: flex-end; text-align: right; z-index: 1; }
    .sb-top { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .sb-pname { font-family: var(--f-display); font-weight: 900; font-size: 19px; letter-spacing: -.02em; line-height: 1; white-space: nowrap; }
    .sb-prk { font-family: var(--f-mono); font-size: 8px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; white-space: nowrap; }
    .sb-pnum { font-family: var(--f-display); font-weight: 900; font-size: 58px; letter-spacing: -.04em; line-height: .8; }
    .sb-seg--win .sb-pname, .sb-seg--win .sb-pnum { color: #fff; }
    .sb-seg--win .sb-prk { color: rgba(255,255,255,0.72); }
    .sb-tag { display: inline-block; margin-left: 7px; font-family: var(--f-mono); font-size: 7px; font-weight: 700; letter-spacing: .06em; padding: 2px 6px; border-radius: 4px; background: var(--rk-champ); color: #fff; vertical-align: middle; }
    .sb-seg--lose .sb-pname { color: var(--tx-2); }
    .sb-seg--lose .sb-pnum { color: var(--tx-3); }
    .sb-seg--lose .sb-prk { color: var(--tx-3); }
    .sh-fin { display: block; width: max-content; margin: 14px auto 2px; font-family: var(--f-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #1a7a0a; background: rgba(57,255,20,.1); padding: 4px 11px; border-radius: 6px; }

    /* card header (titles live inside cards) */
    .card-h { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--tx-3); margin-bottom: 12px; }

    .sec-label { font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--tx-3); margin: 6px 4px 9px; }

    /* ── Round recap ── */
    .recap { border-radius: 16px; padding: 6px 14px; margin-bottom: 12px; }
    .rrow { display: grid; grid-template-columns: 24px 1fr auto 1fr 30px; align-items: center; gap: 6px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .rrow:last-child { border-bottom: none; }
    .rn { font-family: var(--f-mono); font-size: 9px; color: var(--tx-3); text-align: center; }
    .rw { font-family: var(--f-mono); font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    .rw--l { color: var(--rk-champ); }
    .rw--r { color: var(--tx-3); text-align: right; }
    .rfin { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .ftag { font-family: var(--f-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; }
    .ftag--burst { color: hsl(8 95% 50%); background: hsl(8 95% 95%); }
    .ftag--over { color: hsl(25 95% 45%); background: hsl(25 95% 94%); }
    .ftag--spin { color: hsl(220 60% 47%); background: hsl(220 60% 95%); }
    .ftag--xtreme { color: #1a7a0a; background: rgba(57,255,20,.1); }
    .rsc { font-family: var(--f-mono); font-size: 9px; font-weight: 700; color: var(--tx-3); text-align: center; }
    .rpt { font-family: var(--f-mono); font-size: 9px; font-weight: 700; text-align: right; color: var(--tx-3); }
    .rpt--pos { color: var(--rk-champ); }

    /* ── Stats / rank change ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; background: transparent !important; padding: 10px 10px 24px; }
    .skin-aqua .stat { box-shadow: 2px 3px 9px rgba(20,32,46,0.07), inset 0 1px 0 rgba(255,255,255,0.92) !important; }
    .stat { border-radius: 14px; padding: 14px 15px; }
    .stat-k { font-family: var(--f-mono); font-size: 8px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-3); }
    .stat-v { font-family: var(--f-display); font-weight: 900; font-size: 21px; letter-spacing: -.02em; color: var(--tx); margin-top: 5px; line-height: 1; }
    .stat-v small { font-size: 11px; color: var(--tx-3); font-weight: 700; }
    .stat-v .up { color: #1a7a3a; }
    .rank-prog { border-radius: 14px; padding: 15px 16px; margin-bottom: 14px; }
    .rp-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .rp-cur { font-family: var(--f-display); font-weight: 900; font-size: 15px; color: var(--tx); }
    .rp-next { font-family: var(--f-mono); font-size: 9.5px; color: var(--tx-3); }
    .rp-bar { height: 8px; border-radius: 4px; background: rgba(20,32,46,0.08); overflow: hidden; box-shadow: inset 1px 1px 3px rgba(20,32,46,0.1); }
    .rp-bar i { display: block; height: 100%; border-radius: 4px; background: var(--rk-champ); }
    .rp-hint { font-family: var(--f-mono); font-size: 9px; color: var(--tx-3); margin-top: 7px; letter-spacing: .02em; }

    /* ── Actions ── */
    .res-actions { flex-shrink: 0; padding: 10px 18px 16px; display: flex; flex-direction: column; gap: 9px; background: linear-gradient(to top, #eef0f2 70%, transparent); }
    .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; cursor: pointer; font-family: var(--f-display); font-weight: 900; font-size: 15px; letter-spacing: .02em; }
    .btn--primary { background: var(--tx); color: #fff; box-shadow: 4px 5px 14px rgba(20,32,46,0.22), inset 0 1px 0 rgba(255,255,255,0.16); }
    .btn-row { display: flex; gap: 9px; }
    .btn--ghost { flex: 1; background: rgba(255,255,255,0.6); color: var(--tx-2); box-shadow: 3px 4px 10px rgba(20,32,46,0.07), -3px -3px 8px rgba(255,255,255,0.85), inset 0 1px 0 rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; gap: 7px; font-size: 13px; }
  </style>
</head>
<body class="aqua-bg skin-aqua">
  <div class="app-shell skin-aqua">

    <header class="app-header" style="flex-shrink:0;">
      <a href="Grid Hub.html" style="display:flex;align-items:center;color:var(--tx-2);text-decoration:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <span class="logo">RESULT</span>
      <div class="header-icons">
        <button class="header-icon" title="分享" onclick="window.location='Clash Hub.html'" style="cursor:pointer;border:none;background:var(--glass-bg);">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="11.5" cy="3" r="1.8" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="11.5" cy="12" r="1.8" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="3.5" cy="7.5" r="1.8" stroke="currentColor" stroke-width="1.2"/>
            <path d="M5.2 6.6l4.6-2.7M5.2 8.4l4.6 2.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="res-scroll">
      <div class="res-pager" id="res-pager">

        <!-- Panel 1 — result summary -->
        <section class="rpanel">
          <div class="score-hero">
            <div class="sh-eyebrow">Victory</div>
            <div class="split-bar">
              <div class="sb-seg sb-seg--win">
                <div class="sb-top"><span class="sb-pname">Kai<span class="sb-tag">WIN</span></span><span class="sb-prk">CHAMPION</span></div>
                <span class="sb-pnum">4</span>
              </div>
              <div class="sb-seg sb-seg--lose">
                <div class="sb-top"><span class="sb-pname">Vortex</span><span class="sb-prk">PRIMUS</span></div>
                <span class="sb-pnum">2</span>
              </div>
            </div>
            <span class="sh-fin">XTREME FINISH</span>
          </div>

          <div class="stat-grid">
            <div class="glass stat"><div class="stat-k">積分變化</div><div class="stat-v"><span class="up">+18</span> <small>pts</small></div></div>
            <div class="glass stat"><div class="stat-k">最高終結</div><div class="stat-v">XTREME</div></div>
            <div class="glass stat"><div class="stat-k">連勝</div><div class="stat-v">5 <small>場</small></div></div>
            <div class="glass stat"><div class="stat-k">對戰時長</div><div class="stat-v">12<small>:40</small></div></div>
          </div>
        </section>

        <!-- Panel 2 — round recap + rank -->
        <section class="rpanel">
          <div class="glass rank-prog" style="margin-top:14px;">
            <div class="card-h">階級進度</div>
            <div class="rp-top"><span class="rp-cur">CHAMPION</span><span class="rp-next">距保級門檻 220 pts</span></div>
            <div class="rp-bar"><i style="width:74%"></i></div>
            <div class="rp-hint">本季積分 2,480 · 本場 +18 → 排名維持區內第 3</div>
          </div>
          <div class="glass recap">
            <div class="card-h" style="padding:0 0 4px;">回合回顧 · 6 回合</div>
            <div id="recap"></div>
          </div>
        </section>

      </div>
    </div>

    <div class="res-dots" id="res-dots"><span class="rd on"></span><span class="rd"></span></div>

    <!-- Actions -->
    <div class="res-actions">
      <button class="btn btn--primary" onclick="window.location='Battle Idle.html'">再來一場</button>
      <div class="btn-row">
        <button class="btn btn--ghost" onclick="window.location='Clash Hub.html'">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="11.5" cy="3" r="1.8" stroke="currentColor" stroke-width="1.2"/><circle cx="11.5" cy="12" r="1.8" stroke="currentColor" stroke-width="1.2"/><circle cx="3.5" cy="7.5" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M5.2 6.6l4.6-2.7M5.2 8.4l4.6 2.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          分享戰報
        </button>
        <button class="btn btn--ghost" onclick="window.location='Grid Hub.html'">返回大廳</button>
      </div>
    </div>

  </div>

  <script>
    const ROUNDS = [
      { n:'01', who:'kai', fin:'burst', score:'2 : 0', pts:2 },
      { n:'02', who:'vortex', fin:'over', score:'2 : 2', pts:2 },
      { n:'03', who:'kai', fin:'spin', score:'3 : 2', pts:1 },
      { n:'04', who:'vortex', fin:'spin', score:'3 : 3', pts:1 },
      { n:'05', who:'kai', fin:'over', score:'4 : 3', pts:0 },
      { n:'06', who:'kai', fin:'xtreme', score:'4 : 2', pts:3 },
    ];
    // (note: score column shows running tally per round in real data)
    const FIN = { burst:'BURST', over:'OVER', spin:'SPIN', xtreme:'XTREME' };
    document.getElementById('recap').innerHTML = ROUNDS.map(r=>{
      const kai = r.who==='kai';
      return `<div class="rrow">
        <span class="rn">${r.n}</span>
        <span class="rw rw--l">${kai?'WIN':''}</span>
        <div class="rfin"><span class="ftag ftag--${r.fin}">${FIN[r.fin]}</span></div>
        <span class="rw rw--r">${kai?'':'WIN'}</span>
        <span class="rpt ${kai?'rpt--pos':''}">+${r.pts}</span>
      </div>`;
    }).join('');

    const pager=document.getElementById('res-pager');
    const rds=document.querySelectorAll('#res-dots .rd');
    pager.addEventListener('scroll',()=>{
      const i=Math.round(pager.scrollLeft/pager.clientWidth);
      rds.forEach((d,j)=>d.classList.toggle('on',j===i));
    });
  </script>
</body>
</html>
